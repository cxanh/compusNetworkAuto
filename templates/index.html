<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园网自动登录配置</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
</head>
<body>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

  <main class="relative z-10 min-h-screen py-10 px-4">
    <section class="mx-auto max-w-6xl grid gap-6 lg:grid-cols-[1.1fr_1fr]">
      <div class="glass p-8 lg:p-10 reveal">
        <p class="eyebrow">Campus Portal</p>
        <h1 class="hero-title mt-3">校园网自动登录控制台</h1>
        <p class="mt-4 text-slate-600 text-sm leading-relaxed">
          首次填写账号与参数，后续一键执行。页面会同步更新本地配置文件
          <code>campus_login_config.json</code>。
        </p>

        {% if message %}
          <div class="mt-6 rounded-xl border px-4 py-3 text-sm
            {% if level == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-700{% elif level == 'warn' %}bg-amber-50 border-amber-200 text-amber-700{% else %}bg-rose-50 border-rose-200 text-rose-700{% endif %}">
            {{ message }}
          </div>
        {% endif %}

        <form class="mt-7 space-y-4" action="{{ url_for('save') }}" method="post">
          <div class="grid gap-4 sm:grid-cols-2">
            <label class="field-wrap sm:col-span-2">
              <span>账号</span>
              <input name="username" value="{{ cfg.username }}" required />
            </label>
            <label class="field-wrap sm:col-span-2">
              <span>密码</span>
              <input type="password" name="password" value="{{ cfg.password }}" required />
            </label>
            <label class="field-wrap sm:col-span-2">
              <span>登录地址</span>
              <input name="url" value="{{ cfg.url }}" placeholder="http://10.0.100.3/" />
            </label>
            <label class="field-wrap sm:col-span-2">
              <span>ChromeDriver 路径（可留空自动匹配）</span>
              <input name="chromedriver_path" value="{{ cfg.chromedriver_path }}" placeholder="C:\\Tools\\chromedriver\\..." />
            </label>
            <label class="field-wrap">
              <span>运营商关键词</span>
              <input name="isp_keyword" value="{{ cfg.isp_keyword }}" placeholder="中国联通" />
            </label>
            <div class="rounded-2xl bg-slate-50 border border-slate-200 px-4 py-3">
              <p class="text-xs text-slate-500">常用值</p>
              <p class="text-sm text-slate-700 mt-1">中国联通 / 校园网 / 中国移动 / 中国电信</p>
            </div>
          </div>

          <div class="flex flex-wrap gap-5 pt-1">
            <label class="toggle"><input type="checkbox" name="headless" {% if cfg.headless %}checked{% endif %} /><span>无头模式</span></label>
            <label class="toggle"><input type="checkbox" name="save_screenshots" {% if cfg.save_screenshots %}checked{% endif %} /><span>保存截图</span></label>
          </div>

          <div class="pt-2 flex flex-wrap gap-3">
            <button class="btn btn-primary" type="submit">保存配置</button>
          </div>
        </form>
      </div>

      <aside class="glass p-8 reveal delay">
        <h2 class="text-xl font-semibold text-slate-900">执行面板</h2>
        <p class="mt-2 text-sm text-slate-600">保存后可直接发起一次登录检查，日志将显示在下方。</p>

        <form action="{{ url_for('login_now') }}" method="post" class="mt-5">
          <input type="hidden" name="username" value="{{ cfg.username }}" />
          <input type="hidden" name="password" value="{{ cfg.password }}" />
          <input type="hidden" name="url" value="{{ cfg.url }}" />
          <input type="hidden" name="chromedriver_path" value="{{ cfg.chromedriver_path }}" />
          <input type="hidden" name="isp_keyword" value="{{ cfg.isp_keyword }}" />
          <input type="hidden" name="headless" value="{% if cfg.headless %}on{% endif %}" />
          <input type="hidden" name="save_screenshots" value="{% if cfg.save_screenshots %}on{% endif %}" />
          <button class="btn btn-accent w-full" type="submit">立即登录并检测</button>
        </form>

        <form action="{{ url_for('reset_config') }}" method="post" class="mt-3">
          <button class="btn btn-ghost w-full" type="submit">重置为默认配置</button>
        </form>

        <div class="mt-6">
          <p class="text-xs uppercase tracking-wide text-slate-500">运行日志</p>
          <pre class="log-box mt-2">{{ output if output else '等待执行...' }}</pre>
        </div>

        <div class="mt-5 text-xs text-slate-500 leading-relaxed">
          启动地址：<code>http://127.0.0.1:5050</code><br/>
          双击运行：<code>start_web_ui.bat</code>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
